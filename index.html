<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro Tech - Live Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #chat-feed::-webkit-scrollbar { width: 5px; }
        #chat-feed::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <div class="glass p-4 rounded-2xl mb-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-robot text-white"></i></div>
            <div>
                <h1 class="font-bold text-lg leading-none">AGENTORO <span class="text-blue-500 text-sm">PRO</span></h1>
                <p class="text-[10px] text-gray-400 mt-1">LIVE INSTAGRAM AUTOMATION</p>
            </div>
        </div>
        <div id="sync-indicator" class="text-[10px] font-mono bg-green-500/10 text-green-500 px-3 py-1 rounded-full border border-green-500/20">
            SYSTEM ONLINE
        </div>
    </div>

    <div class="flex-1 glass rounded-3xl overflow-hidden flex flex-col">
        <div id="chat-feed" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col">
            <div class="h-full flex items-center justify-center text-gray-500 italic text-sm">
                Initializing encrypted link to agentoro.shop...
            </div>
        </div>
    </div>

    <script>
        let lastMessageHash = "";

        async function fetchLogs() {
            try {
                const response = await fetch('https://agentoro.shop/get-logs');
                const data = await response.json();
                
                if (!data || data.length === 0) return;

                const feed = document.getElementById('chat-feed');
                const indicator = document.getElementById('sync-indicator');

                // ترتيب البيانات: الأحدث في الأسفل
                const sortedData = data.reverse(); 
                
                // توليد محتوى الدردشة مع فلترة "ردود المعرض المكررة"
                let htmlContent = '';
                let seenResponses = new Set();

                sortedData.forEach(log => {
                    // 1. عرض رسالة الزبون
                    htmlContent += `
                        <div class="flex flex-col items-start space-y-1">
                            <span class="text-[9px] font-bold text-gray-500 ml-2 uppercase">l_incertain1</span>
                            <div class="bg-white text-slate-900 chat-bubble rounded-bl-none shadow-xl">
                                ${log.message}
                                <div class="text-[8px] text-gray-400 mt-2 text-right">${log.time || ''}</div>
                            </div>
                        </div>
                    `;

                    // 2. عرض رد الـ AI (فقط إذا كان الرد جديداً وليس تكراراً مملاً)
                    // الفلترة: إذا كان الرد يحتوي على "يا خويا العزيز" وهو مكرر، نظهر الرد الفعلي فقط
                    if (log.status && log.status !== "Thinking...") {
                        htmlContent += `
                            <div class="flex flex-col items-end space-y-1">
                                <span class="text-[9px] font-bold text-blue-500 mr-2 uppercase">amira_ojj (AI)</span>
                                <div class="bg-blue-600 text-white chat-bubble rounded-br-none shadow-lg shadow-blue-900/20">
                                    ${log.status}
                                    <div class="text-[8px] text-blue-100 mt-2 text-left">${log.time || ''}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                feed.innerHTML = htmlContent;
                feed.scrollTop = feed.scrollHeight;
                indicator.innerText = "LAST SYNC: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error("Connection lost...");
                document.getElementById('sync-indicator').innerText = "RECONNECTING...";
            }
        }

        // تشغيل التحديث فوراً وبسرعة فائقة (كل 2 ثانية لضمان "نفس الوقت")
        fetchLogs();
        setInterval(fetchLogs, 2000);
    </script>
</body>
</html>
